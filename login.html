<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>판다마켓</title>
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <main class="auth">
      <section class="auth-card" aria-label="로그인">
        <a class="brand" href="./index.html">
          <img src="./images/panda_icon.png" alt="판다마켓 로고" />
        </a>

        <form class="auth-form" action="#" method="post">
          <label class="field">
            <span class="label">이메일</span>
            <input
              class="input"
              type="email"
              name="email"
              placeholder="이메일을 입력해 주세요"
            />
          </label>

          <label class="field">
            <span class="label">비밀번호</span>
            <div class="input-wrap">
              <input
                class="input"
                type="password"
                name="password"
                placeholder="비밀번호를 입력해 주세요"
              />

              <button class="eye" type="button" aria-label="비밀번호 보기">
                <img src="images/eyeoff.png" alt="눈아이콘" />
              </button>
            </div>
          </label>

          <button class="submit" type="submit" disabled>로그인</button>
        </form>

        <div class="sns-row" aria-label="간편 로그인">
          <span class="sns-text">간편 로그인하기</span>
          <div class="sns-icons">
            <a
              class="sns"
              href="https://www.google.com/"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Google"
            >
              <img src="구글" alt="" />
            </a>
            <a
              class="sns"
              href="https://www.kakaocorp.com/page/"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Kakao"
            >
              <img src="카카오" alt="" />
            </a>
          </div>
        </div>

        <p class="switch">
          판다마켓이 처음이신가요?
          <a class="switch-link" href="./signup.html">회원가입</a>
        </p>
      </section>
    </main>
  </body>
</html>
