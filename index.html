<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>판다마켓</title>
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="gnb">
      <div class="header-inner">
        <a href="/" class="header-logo" aria-label="판다마켓 홈으로">
          <img src="images/head-image.png" alt="판다마켓" />
        </a>
        <a href="./login.html" class="header-login">로그인</a>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="container">
          <div class="hero-inner">
            <div class="hero-text">
              <h1>일상의 모든 물건을<br />거래해 보세요</h1>
              <a class="hero-cta" href="/items">구경하러 가기</a>
            </div>

            <div class="hero-image" aria-hidden="true">
              <img src="images/hero-panda.png" alt="" />
            </div>
          </div>
        </div>
      </section>

      <section class="features">
        <div class="container feature-inner">
          <div class="feature-card">
            <div class="feature-image" aria-hidden="true">
              <img src="images/feature-image1.png" alt="" />
            </div>

            <div class="feature-text">
              <p class="feature-label">Hot item</p>
              <h2>인기 상품을<br />확인해 보세요</h2>
              <p>가장 HOT한 중고거래 물품을<br />판다 마켓에서 확인해 보세요</p>
            </div>
          </div>

          <div class="feature-card reverse">
            <div class="feature-image" aria-hidden="true">
              <img src="images/feature-image2.png" alt="" />
            </div>

            <div class="feature-text">
              <p class="feature-label">Search</p>
              <h2>구매를 원하는<br />상품을 검색하세요</h2>
              <p>구매하고 싶은 물품은 검색해서<br />쉽게 찾아보세요</p>
            </div>
          </div>

          <div class="feature-card">
            <div class="feature-image" aria-hidden="true">
              <img src="images/feature-image3.png" alt="" />
            </div>

            <div class="feature-text">
              <p class="feature-label">Register</p>
              <h2>판매를 원하는<br />상품을 등록하세요</h2>
              <p>어떤 물건이든 판매하고 싶은 상품을<br />쉽게 등록하세요</p>
            </div>
          </div>
        </div>
      </section>

      <section class="trust">
        <div class="container trust-inner">
          <div class="trust-text">
            <h2>믿을 수 있는<br />판다마켓 중고 거래</h2>
          </div>

          <div class="trust-image" aria-hidden="true">
            <img src="images/trust-image1.png" alt="" />
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container footer-inner">
        <div class="footer-left">
          <p>©codeit - 2024</p>
        </div>

        <div class="footer-center">
          <a class="footer-link" href="/privacy">Privacy Policy</a>
          <a class="footer-link" href="/faq">FAQ</a>
        </div>

        <div class="footer-right">
          <a
            class="sns"
            href="https://facebook.com"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Facebook"
          >
            <img src="images/ic_facebook.png" alt="페이스북으로 이동" />
          </a>

          <a
            class="sns"
            href="https://www.twitter.com"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Twitter"
          >
            <img src="images/ic_twitter.png" alt="트위터로 이동" />
          </a>

          <a
            class="sns"
            href="https://www.youtube.com"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="YouTube"
          >
            <img src="images/ic_youtube.png" alt="유튜브로 이동" />
          </a>

          <a
            class="sns"
            href="https://www.instagram.com"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Instagram"
          >
            <img src="images/ic_instagram.png" alt="sns로 이동" />
          </a>
        </div>
      </div>
    </footer>
  </body>
</html>
